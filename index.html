<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>مدير النظام - مع موقعي الحالي</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: #2c3e50; color: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .upload-area { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .upload-form { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        button { background: #3498db; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .stats-cards { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .card { background: white; border-radius: 12px; padding: 15px; flex: 1; text-align: center; }
        .map-container { height: 500px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #ddd; position: relative; }
        .teams-table { background: white; border-radius: 12px; overflow-x: auto; padding: 15px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: #34495e; color: white; }
        .team-link { background: #ecf0f1; padding: 4px 8px; border-radius: 20px; display: inline-block; text-decoration: none; color: #2c3e50; font-size: 12px; margin-left: 5px; }
        .copy-btn { background: #27ae60; padding: 2px 6px; border-radius: 12px; font-size: 11px; cursor: pointer; color: white; display: inline-block; }
        .completed { background: #2ecc71; color: white; padding: 2px 8px; border-radius: 20px; }
        .pending { background: #e67e22; color: white; padding: 2px 8px; border-radius: 20px; }
        .log-area { background: #f8f9fa; border: 1px solid #ddd; border-radius: 8px; padding: 10px; margin-top: 20px; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .swap-check { display: flex; align-items: center; gap: 8px; }
        .footer { text-align: center; margin-top: 30px; color: #7f8c8d; }
        
        /* أيقونة البالونة */
        .balloon-marker {
            background: transparent;
            width: 36px;
            height: 36px;
            text-align: center;
            font-weight: bold;
            font-size: 12px;
            color: white;
            position: relative;
        }
        .balloon-marker .pin {
            width: 32px;
            height: 32px;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            position: absolute;
            top: 0;
            left: 2px;
        }
        .balloon-marker .pin .number {
            transform: rotate(45deg);
            font-weight: bold;
            font-size: 11px;
            color: white;
            text-shadow: 0 0 1px black;
        }
        .balloon-marker .pin::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 12px;
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
        }
        
        /* لوحة التحكم بالطبقات */
        .layer-control {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.95);
            padding: 8px 12px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 1000;
            display: flex;
            gap: 8px;
            direction: ltr;
            border: 1px solid #ddd;
        }
        .layer-control button {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }
        .layer-control button.active {
            background: #3498db;
            box-shadow: 0 0 0 2px #ffd700;
        }
        .layer-control button:hover {
            background: #1abc9c;
        }
        
        /* زر موقعي الحالي */
        .my-location-btn {
            position: absolute;
            bottom: 20px;
            right: 10px;
            background: #fff;
            padding: 8px 12px;
            border-radius: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 1000;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            border: none;
            background-color: #3498db;
            color: white;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .my-location-btn:hover {
            background-color: #2980b9;
        }
        
        /* علامة الموقع الحالي */
        .current-location-marker {
            background: #4285F4;
            border: 2px solid white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            box-shadow: 0 0 8px rgba(0,0,0,0.3);
        }
        .current-location-pulse {
            border-radius: 50%;
            width: 40px;
            height: 40px;
            background: rgba(66, 133, 244, 0.3);
            position: relative;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 مدير التوزيع الجغرافي (مع موقعي الحالي)</h1>
        <div>
            <button onclick="refreshData()">🔄 تحديث</button>
            <button onclick="exportToExcel()" style="background:#27ae60;">📎 Excel</button>
            <button onclick="refreshAllTokens()" style="background:#e67e22;">🔄 تجديد روابط الفرق</button>
        </div>
    </div>
    <div class="upload-area">
        <h3>📂 رفع الملفات (يدعم أي أعمدة إضافية)</h3>
        <div class="upload-form">
            <div class="form-group"><label>ملف البيانات (عدادات):</label><input type="file" id="dataFile" accept=".csv,.xlsx"></div>
            <div class="form-group"><label>ملف KML:</label><input type="file" id="kmlFile" accept=".kml"></div>
            <div class="swap-check"><label>🔄 تبديل إحداثيات KML</label><input type="checkbox" id="swapCoords"></div>
            <button onclick="uploadAndProcess()">🚀 تحميل وتوزيع (استبدال كامل)</button>
        </div>
        <div id="uploadMsg" style="margin-top:10px;"></div>
        <hr>
        <div style="margin-top:15px;">
            <h4>➕ إضافة عدادات جديدة (بدون مسح القديم)</h4>
            <input type="file" id="appendFile" accept=".csv,.xlsx">
            <button onclick="appendMeters()" style="background:#27ae60;">➕ إضافة إلى البيانات الحالية</button>
        </div>
    </div>
    <div class="stats-cards" id="statsCards"></div>
    <div class="map-container" id="managerMap">
        <div class="layer-control" id="layerControl">
            <button data-layer="street" class="active">🗺️ عادي</button>
            <button data-layer="satellite">🛰️ قمر صناعي</button>
            <button data-layer="terrain">⛰️ تضاريس</button>
        </div>
        <button class="my-location-btn" id="myLocationBtn">📍 موقعي الحالي</button>
    </div>
    <div class="teams-table">
        <h3>📋 الفرق والروابط (تنتهي صلاحيتها بعد 24 ساعة)</h3>
        <table id="teamsTable">
            <thead>汽<th>الفرقة</th><th>العدادات</th><th>تم</th><th>متبقي</th><th>الرابط</th><th>الصلاحية</th> </thead>
            <tbody></tbody>
        </table>
    </div>
    <div class="log-area" id="logArea">📋 سجل العمليات...</div>
    <div class="footer">✅ يمكنك تبديل الخريطة وعرض موقعك الحالي | تظهر العدادات بشكل بالونة ملونة</div>
</div>

<script>
    // رابط Google Apps Script
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzH03lCR9eNuGFqSp4dGhk1hrN6iLSRb-pRtdqrsy9BTuWVhy_wiKNn1jpB1WAfByF8AA/exec';
    let map, markersLayer, polygonLayer;
    let currentTileLayer = null;
    let currentLocationMarker = null;
    let currentLocationCircle = null;
    
    // تعريف طبقات الخريطة
    const tileLayers = {
        street: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB'
        }),
        satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
        }),
        terrain: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.opentopomap.org">OpenTopoMap</a> contributors'
        })
    };
    
    function switchLayer(layerName) {
        if (currentTileLayer) map.removeLayer(currentTileLayer);
        currentTileLayer = tileLayers[layerName];
        currentTileLayer.addTo(map);
        document.querySelectorAll('.layer-control button').forEach(btn => {
            if (btn.dataset.layer === layerName) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    
    // دالة عرض الموقع الحالي
    function showMyLocation() {
        if (!navigator.geolocation) {
            alert("المتصفح لا يدعم تحديد الموقع الجغرافي");
            return;
        }
        navigator.geolocation.getCurrentPosition(
            function(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                // إزالة العلامة السابقة إن وجدت
                if (currentLocationMarker) map.removeLayer(currentLocationMarker);
                if (currentLocationCircle) map.removeLayer(currentLocationCircle);
                // إضافة علامة موقعي الحالي (دائرة زرقاء متحركة)
                const customIcon = L.divIcon({
                    className: 'current-location-marker',
                    iconSize: [16, 16],
                    popupAnchor: [0, -8]
                });
                currentLocationMarker = L.marker([lat, lng], { icon: customIcon }).addTo(map);
                currentLocationMarker.bindPopup("📍 أنت هنا").openPopup();
                // إضافة دائرة نصف قطرها 30 متر للدقة مع تأثير نبض
                currentLocationCircle = L.circle([lat, lng], {
                    radius: 30,
                    color: '#4285F4',
                    fillColor: '#4285F4',
                    fillOpacity: 0.2,
                    weight: 1,
                    className: 'current-location-pulse'
                }).addTo(map);
                // تحريك الخريطة إلى الموقع
                map.setView([lat, lng], 15);
            },
            function(error) {
                let msg = "";
                switch(error.code) {
                    case error.PERMISSION_DENIED: msg = "تم رفض الوصول إلى الموقع"; break;
                    case error.POSITION_UNAVAILABLE: msg = "معلومات الموقع غير متوفرة"; break;
                    case error.TIMEOUT: msg = "انتهى وقت محاولة تحديد الموقع"; break;
                    default: msg = "خطأ غير معروف";
                }
                alert(msg);
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    }
    
    function initMap() {
        map = L.map('managerMap').setView([27.545, 41.712], 12);
        currentTileLayer = tileLayers.street;
        currentTileLayer.addTo(map);
        markersLayer = L.layerGroup().addTo(map);
        polygonLayer = L.layerGroup().addTo(map);
        document.querySelectorAll('.layer-control button').forEach(btn => {
            btn.addEventListener('click', () => switchLayer(btn.dataset.layer));
        });
        document.getElementById('myLocationBtn').addEventListener('click', showMyLocation);
    }
    
    function log(msg) {
        const logDiv = document.getElementById('logArea');
        logDiv.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(msg);
    }
    
    function detectAction(text) {
        if (!text) return 'unknown';
        const str = text.toString().trim().toLowerCase();
        if (str.includes('قفل') || str.includes('اغلاق') || str.includes('غلق') || str === 'lock') return 'lock';
        if (str.includes('فتح') || str === 'unlock' || str.includes('open')) return 'unlock';
        if (str.includes('ملصق') || str.includes('استيكر') || str === 'sticker') return 'sticker';
        return 'unknown';
    }
    
    function createBalloonIcon(meter) {
        let bgColor = '#95a5a6';
        if (meter.status === 'completed') bgColor = '#7f8c8d';
        else if (meter.action === 'lock') bgColor = '#e74c3c';
        else if (meter.action === 'unlock') bgColor = '#2ecc71';
        else if (meter.action === 'sticker') bgColor = '#f39c12';
        const html = `
            <div class="balloon-marker">
                <div class="pin" style="background-color: ${bgColor};">
                    <div class="number">${meter.meterId.length > 4 ? meter.meterId.slice(0,4) : meter.meterId}</div>
                </div>
            </div>
        `;
        return L.divIcon({
            className: 'balloon-marker-container',
            html: html,
            iconSize: [36, 36],
            iconAnchor: [18, 32],
            popupAnchor: [0, -32]
        });
    }
    
    function buildPopupContent(meter) {
        let actionText = { lock:'قفل', unlock:'فتح', sticker:'وضع ملصق' }[meter.action] || 'غير معروف';
        let statusText = meter.status === 'completed' ? '✅ تم الإنجاز' : '⏳ قيد الانتظار';
        let extraHtml = '';
        if (meter.extra && Object.keys(meter.extra).length > 0) {
            extraHtml = '<hr><div style="text-align:right; font-size:11px;">📌 بيانات إضافية:<br>';
            for (let [key, val] of Object.entries(meter.extra)) {
                if (val && val.toString().trim() !== '') extraHtml += `<span style="font-weight:bold;">${key}:</span> ${val}<br>`;
            }
            extraHtml += '</div>';
        }
        return `<div style="text-align:center; min-width:200px;"><b>🚦 العداد: ${meter.meterId}</b><br>📋 الإجراء: ${actionText}<br>📍 الحالة: ${statusText}<br>${extraHtml}${meter.completedAt ? '🕒 وقت الإنجاز: ' + new Date(meter.completedAt).toLocaleString() + '<br>' : ''}<button onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${meter.lat},${meter.lng}')" style="margin-top:5px;">🧭 التنقل</button></div>`;
    }
    
    // قراءة ملف البيانات (CSV/Excel) مع كل الأعمدة
    async function parseDataFile(file) {
        return new Promise((resolve, reject) => {
            const ext = file.name.split('.').pop().toLowerCase();
            const reader = new FileReader();
            reader.onload = (e) => {
                let meters = [];
                if (ext === 'csv') {
                    const text = e.target.result;
                    const lines = text.trim().split(/\r?\n/);
                    if (lines.length < 2) return reject(new Error('ملف CSV فارغ'));
                    const firstLine = lines[0];
                    const hasHeaders = !firstLine.match(/^[\d\.\,\"\s\-]+$/);
                    let headers = [];
                    let colIdx = { id: -1, lat: -1, lng: -1, action: -1 };
                    let startIdx = 0;
                    if (hasHeaders) {
                        headers = firstLine.split(',').map(h => h.trim().replace(/["']/g, '').toLowerCase());
                        for (let i=0; i<headers.length; i++) {
                            const h = headers[i];
                            if (h.match(/(meter|id|رقم|meterid)/i)) colIdx.id = i;
                            if (h.match(/(lat|عرض|y|latitude)/i)) colIdx.lat = i;
                            if (h.match(/(lng|lon|طول|x|longitude)/i)) colIdx.lng = i;
                            if (h.match(/(action|الإجراء|الاجراء)/i)) colIdx.action = i;
                        }
                        startIdx = 1;
                    } else {
                        headers = ['meter_id','lat','lng','action'];
                        colIdx = { id:0, lat:1, lng:2, action:3 };
                    }
                    if (colIdx.id === -1 || colIdx.lat === -1 || colIdx.lng === -1)
                        return reject(new Error('الأعمدة الأساسية (meter_id, lat, lng) غير موجودة'));
                    for (let i=startIdx; i<lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line) continue;
                        let parts = [];
                        let inQuote = false, current = '';
                        for (let ch of line) {
                            if (ch === '"') inQuote = !inQuote;
                            else if (ch === ',' && !inQuote) { parts.push(current.trim()); current = ''; }
                            else current += ch;
                        }
                        parts.push(current.trim());
                        if (parts.length < 3) continue;
                        const meterId = parts[colIdx.id]?.replace(/["']/g, '');
                        const lat = parseFloat(parts[colIdx.lat]?.replace(/["']/g, ''));
                        const lng = parseFloat(parts[colIdx.lng]?.replace(/["']/g, ''));
                        const actionRaw = (colIdx.action !== -1 && parts[colIdx.action]) ? parts[colIdx.action].replace(/["']/g, '') : '';
                        const action = detectAction(actionRaw);
                        if (meterId && !isNaN(lat) && !isNaN(lng)) {
                            let extra = {};
                            for (let j=0; j<parts.length; j++) {
                                if (j !== colIdx.id && j !== colIdx.lat && j !== colIdx.lng && j !== colIdx.action) {
                                    let headerName = (hasHeaders && j < headers.length) ? headers[j] : `col_${j+1}`;
                                    let val = parts[j]?.replace(/["']/g, '').trim();
                                    if (val) extra[headerName] = val;
                                }
                            }
                            meters.push({
                                id: crypto.randomUUID(),
                                meterId: String(meterId),
                                lat, lng, action,
                                status: 'pending', completedAt: null, teamId: null,
                                extra: extra
                            });
                        }
                    }
                } else if (ext === 'xlsx') {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const sheet = wb.Sheets[wb.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                    if (rows.length < 2) return reject(new Error('Excel فارغ'));
                    const headers = rows[0].map(c => String(c).trim().toLowerCase());
                    let colIdx = { id: -1, lat: -1, lng: -1, action: -1 };
                    for (let i=0; i<headers.length; i++) {
                        const h = headers[i];
                        if (h.match(/(meter|id|رقم|meterid)/i)) colIdx.id = i;
                        if (h.match(/(lat|عرض|y|latitude)/i)) colIdx.lat = i;
                        if (h.match(/(lng|lon|طول|x|longitude)/i)) colIdx.lng = i;
                        if (h.match(/(action|الإجراء|الاجراء)/i)) colIdx.action = i;
                    }
                    if (colIdx.id === -1 || colIdx.lat === -1 || colIdx.lng === -1)
                        return reject(new Error('الأعمدة الأساسية غير موجودة'));
                    for (let i=1; i<rows.length; i++) {
                        const row = rows[i];
                        if (!row || row.length < 3) continue;
                        const meterId = row[colIdx.id] ? String(row[colIdx.id]).trim() : '';
                        const lat = parseFloat(row[colIdx.lat]);
                        const lng = parseFloat(row[colIdx.lng]);
                        const actionRaw = (colIdx.action !== -1 && row[colIdx.action]) ? String(row[colIdx.action]).trim() : '';
                        const action = detectAction(actionRaw);
                        if (meterId && !isNaN(lat) && !isNaN(lng)) {
                            let extra = {};
                            for (let j=0; j<row.length; j++) {
                                if (j !== colIdx.id && j !== colIdx.lat && j !== colIdx.lng && j !== colIdx.action) {
                                    let headerName = (j < headers.length) ? headers[j] : `col_${j+1}`;
                                    let val = row[j] ? String(row[j]).trim() : '';
                                    if (val) extra[headerName] = val;
                                }
                            }
                            meters.push({
                                id: crypto.randomUUID(),
                                meterId, lat, lng, action,
                                status: 'pending', completedAt: null, teamId: null,
                                extra: extra
                            });
                        }
                    }
                } else reject(new Error('نوع ملف غير مدعوم'));
                log(`✅ تم قراءة ${meters.length} عداد`);
                resolve(meters);
            };
            reader.onerror = () => reject(new Error('فشل قراءة الملف'));
            if (ext === 'csv') reader.readAsText(file, 'UTF-8');
            else if (ext === 'xlsx') reader.readAsArrayBuffer(file);
            else reject(new Error('امتداد غير مدعوم'));
        });
    }
    
    // تحليل KML
    async function parseKMLFile(file, swapCoords) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const xml = new DOMParser().parseFromString(e.target.result, 'text/xml');
                const placemarks = xml.getElementsByTagName('Placemark');
                let polygons = [];
                for (let pm of placemarks) {
                    let name = pm.getElementsByTagName('name')[0]?.textContent || 'منطقة';
                    let coords = [];
                    const polygonNode = pm.getElementsByTagName('Polygon')[0];
                    if (polygonNode) {
                        const coordStr = polygonNode.getElementsByTagName('coordinates')[0]?.textContent.trim();
                        if (coordStr) coords = parseKMLCoords(coordStr, swapCoords);
                    } else {
                        const multi = pm.getElementsByTagName('MultiGeometry')[0];
                        if (multi) {
                            for (let p of multi.getElementsByTagName('Polygon')) {
                                const cs = p.getElementsByTagName('coordinates')[0]?.textContent.trim();
                                if (cs) coords.push(...parseKMLCoords(cs, swapCoords));
                            }
                        }
                    }
                    if (coords.length) polygons.push({ name, coords });
                }
                if (polygons.length === 0) reject(new Error('لا توجد مضلعات صالحة'));
                resolve(polygons);
            };
            reader.onerror = () => reject(new Error('فشل قراءة KML'));
            reader.readAsText(file);
        });
    }
    function parseKMLCoords(coordStr, swap) {
        return coordStr.trim().split(/\s+/).map(p => {
            let [lng, lat] = p.split(',').map(Number);
            if (swap) [lat, lng] = [lng, lat];
            return { lat, lng };
        }).filter(p => !isNaN(p.lat) && !isNaN(p.lng));
    }
    
    function isPointInPolygon(point, polygon) {
        let x = point.lng, y = point.lat, inside = false;
        for (let i=0, j=polygon.length-1; i<polygon.length; j=i++) {
            let xi = polygon[i].lng, yi = polygon[i].lat;
            let xj = polygon[j].lng, yj = polygon[j].lat;
            let intersect = ((yi>y) != (yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi);
            if (intersect) inside = !inside;
        }
        return inside;
    }
    
    function assignMetersToTeams(meters, polygons) {
        let teams = polygons.map((p,i) => ({
            id: crypto.randomUUID(), token: Math.random().toString(36).substring(2,12),
            name: p.name || `الفرقة ${i+1}`, polygonCoords: p.coords, meterIds: []
        }));
        let assigned = 0;
        for (let m of meters) {
            let found = false;
            for (let t of teams) {
                if (isPointInPolygon({ lat: m.lat, lng: m.lng }, t.polygonCoords)) {
                    t.meterIds.push(m.id); m.teamId = t.id; assigned++; found = true; break;
                }
            }
            if (!found) {
                let def = teams.find(t => t.name === 'خارج المناطق');
                if (!def) { def = { id: crypto.randomUUID(), token: Math.random().toString(36).substring(2,12), name: 'خارج المناطق', polygonCoords: [], meterIds: [] }; teams.push(def); }
                def.meterIds.push(m.id); m.teamId = def.id;
            }
        }
        teams = teams.filter(t => t.meterIds.length > 0);
        return { teams, meters };
    }
    
    async function saveToGoogleSheets(teams, meters) {
        const payload = new URLSearchParams({ action:'uploadData', metersJson:JSON.stringify(meters), teamsJson:JSON.stringify(teams) }).toString();
        try {
            const res = await fetch(SCRIPT_URL, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:payload });
            const result = await res.json();
            return result.success;
        } catch(e) { log('❌ خطأ في الحفظ: '+e.message); return false; }
    }
    
    async function loadFromGoogleSheets() {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getManagerData`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        } catch(e) { log('⚠️ فشل التحميل: '+e.message); return null; }
    }
    
    async function appendMeters() {
        const appendFile = document.getElementById('appendFile').files[0];
        if (!appendFile) { alert('اختر ملف البيانات الجديد'); return; }
        try {
            const newMeters = await parseDataFile(appendFile);
            if (newMeters.length === 0) throw new Error('لا توجد عدادات صالحة');
            const currentData = await loadFromGoogleSheets();
            if (!currentData || !currentData.meters) throw new Error('لا توجد بيانات حالية، قم برفع الملف الأساسي أولاً');
            const existingIds = new Set(currentData.meters.map(m => m.meterId));
            const metersToAdd = newMeters.filter(m => !existingIds.has(m.meterId));
            if (metersToAdd.length === 0) { alert('جميع العدادات الجديدة موجودة بالفعل'); return; }
            const allMeters = [...currentData.meters, ...metersToAdd];
            const polygons = currentData.teams.map(t => ({ name: t.name, coords: t.polygonCoords }));
            if (polygons.length === 0) throw new Error('لا توجد مناطق محددة مسبقاً');
            const { teams, meters: reassignedMeters } = assignMetersToTeams(allMeters, polygons);
            const saved = await saveToGoogleSheets(teams, reassignedMeters);
            if (saved) {
                alert(`تمت إضافة ${metersToAdd.length} عداد جديد وإعادة توزيع جميع العدادات`);
                refreshData();
            } else alert('فشل حفظ البيانات بعد الإضافة');
        } catch(err) { alert('خطأ: '+err.message); log(err.message); }
    }
    
    function updateMap(teams, meters) {
        markersLayer.clearLayers(); polygonLayer.clearLayers();
        for (let t of teams) {
            if (t.polygonCoords?.length>2) {
                const latlngs = t.polygonCoords.map(p=>[p.lat,p.lng]);
                L.polygon(latlngs, { color:'#2c3e50', weight:2, fillColor:'#3498db', fillOpacity:0.1 }).addTo(polygonLayer);
            }
        }
        for (let m of meters) {
            const icon = createBalloonIcon(m);
            const marker = L.marker([m.lat,m.lng], { icon:icon }).addTo(markersLayer);
            marker.bindPopup(buildPopupContent(m));
        }
    }
    
    function updateStats(teams, meters) {
        const total=meters.length, completed=meters.filter(m=>m.status==='completed').length;
        document.getElementById('statsCards').innerHTML = `<div class="card"><h3>${total}</h3><p>إجمالي</p></div><div class="card"><h3 style="color:#2ecc71">${completed}</h3><p>تم</p></div><div class="card"><h3 style="color:#e67e22">${total-completed}</h3><p>متبقي</p></div><div class="card"><h3>${teams.length}</h3><p>الفرق</p></div>`;
    }
    
    function updateTeamsTable(teams, meters) {
        const tbody = document.querySelector('#teamsTable tbody');
        tbody.innerHTML = '';
        const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
        for (let team of teams) {
            const teamMeters = meters.filter(m => m.teamId === team.id);
            const completed = teamMeters.filter(m => m.status === 'completed').length;
            const link = `${baseUrl}team.html?token=${team.token}`;
            let expiryHtml = '';
            if (team.tokenExpiry) {
                const expiryDate = new Date(team.tokenExpiry);
                const valid = expiryDate > new Date();
                expiryHtml = `<span style="background:${valid?'#2ecc71':'#e74c3c'}; color:white; padding:2px 8px; border-radius:20px; font-size:11px;">${valid?'صالحة حتى':'منتهية'} ${expiryDate.toLocaleString()}</span>`;
            }
            const row = tbody.insertRow();
            row.insertCell(0).innerText = team.name;
            row.insertCell(1).innerText = teamMeters.length;
            row.insertCell(2).innerHTML = `<span class="completed">${completed}</span>`;
            row.insertCell(3).innerHTML = `<span class="pending">${teamMeters.length-completed}</span>`;
            row.insertCell(4).innerHTML = `<a href="${link}" target="_blank" class="team-link">🔗 رابط الفريق</a> <span class="copy-btn" onclick="navigator.clipboard.writeText('${link}'); alert('تم نسخ الرابط')">📋 نسخ</span>`;
            row.insertCell(5).innerHTML = expiryHtml;
        }
    }
    
    async function refreshData() {
        const data = await loadFromGoogleSheets();
        if (data?.teams && data?.meters) {
            updateMap(data.teams, data.meters);
            updateStats(data.teams, data.meters);
            updateTeamsTable(data.teams, data.meters);
        } else log('⚠️ لا توجد بيانات لعرضها');
    }
    
    async function uploadAndProcess() {
        const dataFile = document.getElementById('dataFile').files[0];
        const kmlFile = document.getElementById('kmlFile').files[0];
        const swap = document.getElementById('swapCoords').checked;
        if (!dataFile || !kmlFile) { alert('اختر الملفين'); return; }
        document.getElementById('uploadMsg').innerHTML = '⏳ جاري...';
        try {
            const meters = await parseDataFile(dataFile);
            const polygons = await parseKMLFile(kmlFile, swap);
            if (!meters.length) throw new Error('لا توجد عدادات');
            if (!polygons.length) throw new Error('لا توجد مضلعات');
            const { teams, meters: assigned } = assignMetersToTeams(meters, polygons);
            const saved = await saveToGoogleSheets(teams, assigned);
            if (saved) {
                document.getElementById('uploadMsg').innerHTML = '✅ تم الحفظ في Google Sheets';
                refreshData();
            } else document.getElementById('uploadMsg').innerHTML = '⚠️ فشل الحفظ';
        } catch(err) { document.getElementById('uploadMsg').innerHTML = `❌ ${err.message}`; log(err.message); }
    }
    
    async function exportToExcel() {
        const data = await loadFromGoogleSheets();
        if (!data?.meters) { alert('لا توجد بيانات'); return; }
        const rows = data.meters.map(m => {
            let base = { 'رقم العداد': m.meterId, 'خط العرض': m.lat, 'خط الطول': m.lng, 'الإجراء الأساسي': { lock:'قفل', unlock:'فتح', sticker:'ملصق' }[m.action]||m.action, 'الحالة': m.status==='completed'?'تم':'قيد', 'وقت الإنجاز': m.completedAt||'', 'الفرقة': data.teams.find(t=>t.id===m.teamId)?.name||'' };
            if (m.extra) Object.assign(base, m.extra);
            return base;
        });
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'تقرير');
        XLSX.writeFile(wb, `report_${new Date().toISOString().slice(0,19)}.xlsx`);
    }
    
    async function refreshAllTokens() {
        if (!confirm('سيتم تجديد روابط جميع الفرق لمدة 24 ساعة جديدة. هل تريد المتابعة؟')) return;
        try {
            const res = await fetch(`${SCRIPT_URL}?action=refreshAllTokens`);
            const result = await res.json();
            if (result.success) { alert(result.message); refreshData(); }
            else alert('فشل التجديد');
        } catch(err) { alert('خطأ في الاتصال'); }
    }
    
    initMap();
    refreshData();
    setInterval(refreshData, 10000);
</script>
