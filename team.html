<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>خريطة الفريق - نظام العدادات</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#1e272e; }
        .header { background:#006266; color:white; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; }
        .stats { background:#3c6382; padding:8px 15px; border-radius:30px; font-size:0.9rem; }
        .map-container { height: calc(100vh - 80px); width:100%; }
        .info-panel { position:fixed; bottom:20px; left:20px; background:rgba(0,0,0,0.7); color:white; padding:8px 15px; border-radius:8px; z-index:1000; font-size:12px; pointer-events:none; }
        button { background:#0984e3; border:none; color:white; padding:5px 12px; border-radius:20px; cursor:pointer; margin-top:5px; }
        .meter-icon { background:transparent; border:none; text-align:center; font-weight:bold; font-size:12px; width:40px !important; height:40px !important; display:flex; align-items:center; justify-content:center; border-radius:50%; color:white; text-shadow:0 0 2px black; box-shadow:0 0 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
<div class="header">
    <h2>📍 فريق: <span id="teamName">...</span></h2>
    <div class="stats" id="statsRemaining">المهام المتبقية: --</div>
</div>
<div id="teamMap" class="map-container"></div>
<div class="info-panel">🧭 تظهر أرقام العدادات والبيانات الإضافية | اضغط على عداد ثم "تم الإنجاز"</div>
<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyxCI2RK1mlSpTmdy2DKqExAED3yDYaU1phYy6KUjxzreGCLw1_hSkZVLdEUg7_s6SqSg/exec';
    let map, markersLayer, currentTeamToken = null;

    function getMeterIcon(meter) {
        let bgColor = '#95a5a6';
        if (meter.action === 'lock') bgColor = '#e74c3c';
        else if (meter.action === 'unlock') bgColor = '#2ecc71';
        else if (meter.action === 'sticker') bgColor = '#f39c12';
        return L.divIcon({
            className: 'meter-icon',
            html: `<div style="background-color:${bgColor}; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid white; box-shadow:0 0 4px rgba(0,0,0,0.5); font-weight:bold; font-size:12px; color:white;">${meter.meterId.length > 6 ? meter.meterId.slice(0,6) : meter.meterId}</div>`,
            iconSize: [36,36], iconAnchor: [18,18], popupAnchor: [0,-18]
        });
    }

    function buildPopupContent(meter) {
        let actionText = { lock:'قفل', unlock:'فتح', sticker:'وضع ملصق' }[meter.action] || 'غير معروف';
        let extraHtml = '';
        if (meter.extra && Object.keys(meter.extra).length > 0) {
            extraHtml = '<hr><div style="text-align:right; font-size:11px;">📌 بيانات إضافية:<br>';
            for (let [key, val] of Object.entries(meter.extra)) {
                if (val && val.toString().trim() !== '') extraHtml += `<span style="font-weight:bold;">${key}:</span> ${val}<br>`;
            }
            extraHtml += '</div>';
        }
        return `<div style="text-align:center; min-width:180px;"><strong>🚦 العداد: ${meter.meterId}</strong><br>🛠️ الإجراء: ${actionText}<br>${extraHtml}<button id="complete_${meter.id}" style="background:#27ae60;">✅ تم الإنجاز</button><br><button onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${meter.lat},${meter.lng}')" style="background:#2980b9; margin-top:5px;">🧭 التنقل</button></div>`;
    }

    function initMap() {
        map = L.map('teamMap').setView([27.545,41.712],12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OSM'}).addTo(map);
        markersLayer = L.layerGroup().addTo(map);
    }

    async function loadTeamData() {
        const token = new URLSearchParams(location.search).get('token');
        if (!token) { document.getElementById('teamName').innerText='رابط غير صالح'; return null; }
        currentTeamToken = token;
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getManagerData`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const team = data.teams.find(t => t.token === token);
            if (!team) { document.getElementById('teamName').innerText='فريق غير موجود'; return null; }
            if (team.tokenExpiry && new Date(team.tokenExpiry) <= new Date()) {
                document.getElementById('teamName').innerHTML='⚠️ انتهت صلاحية الرابط';
                document.getElementById('statsRemaining').innerHTML='يرجى التواصل مع المدير';
                return null;
            }
            document.getElementById('teamName').innerText = team.name;
            const pending = data.meters.filter(m => m.teamId === team.id && m.status === 'pending');
            document.getElementById('statsRemaining').innerText = `📋 المتبقية: ${pending.length}`;
            return { team, pendingMeters: pending };
        } catch(e) { document.getElementById('teamName').innerText='خطأ في الاتصال'; return null; }
    }

    async function refreshMap() {
        const result = await loadTeamData();
        if (!result) return;
        const { team, pendingMeters } = result;
        markersLayer.clearLayers();
        if (team.polygonCoords?.length>2) {
            const latlngs = team.polygonCoords.map(p=>[p.lat,p.lng]);
            L.polygon(latlngs, { color:'#f1c40f', weight:3, fillColor:'#f39c12', fillOpacity:0.2 }).addTo(markersLayer)
                .bindPopup(`<b>${team.name}</b><br>نطاقك`);
        }
        for (let m of pendingMeters) {
            const icon = getMeterIcon(m);
            const marker = L.marker([m.lat,m.lng], { icon:icon }).addTo(markersLayer);
            const popupContent = buildPopupContent(m);
            marker.bindPopup(popupContent);
            marker.on('popupopen', () => {
                const btn = document.getElementById(`complete_${m.id}`);
                if (btn) btn.onclick = () => completeMeter(m.id);
            });
        }
    }

    async function completeMeter(meterId) {
        if (!confirm('إتمام المهمة؟')) return;
        try {
            const res = await fetch(`${SCRIPT_URL}?action=completeMeter&meterId=${meterId}&teamToken=${currentTeamToken}`);
            const result = await res.json();
            if (result.success) { alert('✅ تم'); refreshMap(); }
            else alert('❌ فشل: '+ (result.error||''));
        } catch(e) { alert('خطأ في الاتصال'); }
    }

    initMap();
    refreshMap();
    setInterval(refreshMap, 8000);
</script>
</body>
</html>
