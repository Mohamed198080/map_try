<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>خريطة الفريق</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin:0; font-family: 'Segoe UI'; background:#1e272e; }
        .header { background:#006266; color:white; padding:15px; display:flex; justify-content:space-between; }
        .map-container { height: calc(100vh - 80px); width:100%; }
        .info-panel { position:fixed; bottom:20px; left:20px; background:rgba(0,0,0,0.7); color:white; padding:8px 15px; border-radius:8px; }
        button { background:#0984e3; border:none; color:white; padding:5px 12px; border-radius:20px; cursor:pointer; }
    </style>
</head>
<body>
<div class="header">
    <h2>📍 فريق: <span id="teamName">...</span></h2>
    <div class="stats" id="statsRemaining">المهام المتبقية: --</div>
</div>
<div id="teamMap" class="map-container"></div>
<div class="info-panel">🧭 اضغط على عداد ثم "تم الإنجاز"</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwCff-wW7exheB2ZXC8kPtUDR3iH4uhBgATc8X9QGlNRJGx0aNdMz3MG-CkxoR3_WNV3g/exec';
    let map, markersLayer, currentToken = null;
    function initMap() { map = L.map('teamMap').setView([27.545,41.712],12); L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map); markersLayer = L.layerGroup().addTo(map); }
    async function loadTeam() {
        const token = new URLSearchParams(location.search).get('token');
        if (!token) { document.getElementById('teamName').innerText = 'رابط غير صالح'; return; }
        currentToken = token;
        const res = await fetch(`${SCRIPT_URL}?action=getManagerData`);
        const data = await res.json();
        const team = data.teams.find(t => t.token === token);
        if (!team) { document.getElementById('teamName').innerText = 'فريق غير موجود'; return; }
        document.getElementById('teamName').innerText = team.name;
        const pending = data.meters.filter(m => m.teamId === team.id && m.status === 'pending');
        document.getElementById('statsRemaining').innerText = `📋 المتبقية: ${pending.length}`;
        markersLayer.clearLayers();
        if (team.polygonCoords?.length>2) L.polygon(team.polygonCoords.map(p=>[p.lat,p.lng]), { color:'#f1c40f', weight:3, fillColor:'#f39c12', fillOpacity:0.2 }).addTo(markersLayer);
        for (let m of pending) {
            let color = m.action==='lock'?'#e74c3c':m.action==='unlock'?'#2ecc71':'#f39c12';
            const marker = L.circleMarker([m.lat,m.lng], { radius:12, fillColor:color, color:'#fff', weight:2, fillOpacity:0.9 }).addTo(markersLayer);
            const actionAr = { lock:'قفل', unlock:'فتح', sticker:'ملصق' }[m.action];
            marker.bindPopup(`<div style="text-align:center"><strong>العداد: ${m.meterId}</strong><br>الإجراء: ${actionAr}<br><button onclick="completeMeter('${m.id}')">✅ تم الإنجاز</button><button onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${m.lat},${m.lng}')">🧭 التنقل</button></div>`);
        }
    }
    window.completeMeter = async (meterId) => {
        if (!confirm('إتمام المهمة؟')) return;
        const res = await fetch(`${SCRIPT_URL}?action=completeMeter&meterId=${meterId}&teamToken=${currentToken}`);
        const result = await res.json();
        if (result.success) { alert('تم'); loadTeam(); } else alert('فشل');
    };
    initMap(); loadTeam(); setInterval(loadTeam, 8000);
</script>
</body>
</html>
